<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Rutina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --text: #f0f0f8;
    --muted: #6a6a80;
    --border: #2a2a38;
    --series1: #ff6b47;
    --series2: #ffa847;
    --series3: #47ffa8;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0a0f 0%, #12121e 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .new-day-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .new-day-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }
  .modal-icon { font-size: 2rem; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .modal-text { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 22px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); transition: all 0.15s;
  }
  .modal-btn-cancel { background: var(--surface2); color: var(--muted); }
  .modal-btn-cancel:hover { color: var(--text); }
  .modal-btn-confirm { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
  .modal-btn-confirm:hover { opacity: 0.9; }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* MAIN CONTENT */
  main { padding: 20px 16px; max-width: 700px; margin: 0 auto; }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .day-subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  /* EXERCISE CARD */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .exercise-card:hover { border-color: #3a3a50; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }

  .ex-name {
    font-weight: 600;
    font-size: 0.88rem;
    line-height: 1.3;
    flex: 1;
  }

  .ex-badges {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .badge {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 50px;
  }
  .badge-normal { background: #1e2a1e; color: #47ffa8; border: 1px solid #2a3e2a; }
  .badge-super { background: #2a1e2a; color: #ff47c8; border: 1px solid #3e2a3e; }
  .badge-drop { background: #2a1e1e; color: #ff6b47; border: 1px solid #3e2a2a; }
  .badge-iso { background: #1e1e2a; color: #47c8ff; border: 1px solid #2a2a3e; }

  .toggle-icon {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .exercise-card.open .toggle-icon { transform: rotate(180deg); }

  /* SERIES */
  .series-container {
    display: none;
    padding: 0 12px 14px;
    gap: 8px;
    flex-direction: column;
  }
  .exercise-card.open .series-container { display: flex; }

  .series-row {
    display: grid;
    grid-template-columns: 80px 1fr 1fr;
    gap: 8px;
    align-items: center;
  }

  .series-label {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .series-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    line-height: 1;
  }
  .series-num.s1 { color: var(--series1); }
  .series-num.s2 { color: var(--series2); }
  .series-num.s3 { color: var(--series3); }
  .series-num.s4 { color: #c847ff; }

  .rep-hint {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .input-label {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }

  .btn-adj {
    background: none;
    border: none;
    color: var(--muted);
    width: 28px;
    height: 36px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-adj:hover { color: var(--accent); }

  .num-input {
    background: none;
    border: none;
    color: var(--text);
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    width: 100%;
    height: 36px;
    min-width: 0;
    outline: none;
    padding: 0 2px;
  }
  .num-input::placeholder { color: var(--muted); }

  /* COMPLETED CHECK */
  .series-check {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
  }

  .series-row-wrap {
    position: relative;
  }

  /* COMPLETE BUTTON */
  .complete-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    margin-top: 20px;
  }
  .complete-btn.done {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
  }
  .complete-btn:hover { border-color: var(--accent); }

  /* PROGRESS BAR */
  .day-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* SUPER TAG */
  .super-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.62rem;
    color: #ff47c8;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    background: #1a0d1a;
    border-top: 1px solid #2a1a2a;
    border-bottom: 1px solid #2a1a2a;
  }
  .super-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff47c8; }

  /* NOTES */
  .card-notes {
    padding: 8px 16px 12px;
    font-size: 0.7rem;
    color: var(--muted);
    font-style: italic;
    display: none;
  }
  .exercise-card.open .card-notes { display: block; }

</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>RUTINA</h1>
    <span class="subtitle">Tracker de pesos y reps</span>

  </div>
  <div class="day-tabs" id="dayTabs"></div>

      <button class="modal-btn modal-btn-confirm" onclick="confirmNewDay()">Confirmar</button>

</div>

        type: "normal",
        series: [
          { hint: "15–20 reps", weightRef: 20, repsRef: 20 },
          { hint: "15–20 reps", weightRef: 20, repsRef: 18 },
          { hint: "15–20 reps", weightRef: 20, repsRef: 16 },
        ]
      },
    ]
  }
];

// State
const state = {};
const STORAGE_KEY = 'rutina-data-v1';

function initState() {
  DAYS.forEach(day => {
    state[day.id] = { completed: {}, values: {} };
    day.exercises.forEach((ex, ei) => {
      state[day.id].completed[ei] = {};
      state[day.id].values[ei] = {};
      ex.series.forEach((s, si) => {
        state[day.id].completed[ei][si] = false;
        state[day.id].values[ei][si] = {
          weight: s.weightRef !== undefined ? s.weightRef : '',
          reps: s.repsRef !== undefined ? s.repsRef : ''
        };
      });
    });
  });
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    DAYS.forEach(day => {
      if (!saved[day.id]) return;
      day.exercises.forEach((ex, ei) => {
        if (saved[day.id].completed && saved[day.id].completed[ei]) {
          Object.assign(state[day.id].completed[ei], saved[day.id].completed[ei]);
        }
        if (saved[day.id].values && saved[day.id].values[ei]) {
          Object.assign(state[day.id].values[ei], saved[day.id].values[ei]);
        }
      });
    });
  } catch(e) {}
}

function getTypeBadge(type) {
  const map = {
    normal: '<span class="badge badge-normal">Normal</span>',
    super:  '<span class="badge badge-super">Superserie</span>',
    drop:   '<span class="badge badge-drop">Dropset</span>',
    iso:    '<span class="badge badge-iso">Isométrico</span>',
  };
  return map[type] || '';
}

function seriesColorClass(si) {
  const cls = ['s1','s2','s3','s4'];
  return cls[si] || 's4';
}

function buildCard(ex, exIdx, dayId) {
  const seriesNums = ['S1','S2','S3','S4'];

  let seriesHTML = '';
  ex.series.forEach((s, si) => {
    const saved = state[dayId].values[exIdx][si];
    const wVal = saved ? saved.weight : (s.weightRef !== undefined ? s.weightRef : '');
    const rVal = saved ? saved.reps : (s.repsRef !== undefined ? s.repsRef : '');
    const isDone = state[dayId].completed[exIdx][si];
    const col = seriesColorClass(si);

    seriesHTML += `
      <div class="series-row">
        <div class="series-label">
          <span class="series-num ${col}">${seriesNums[si]}</span>
          <span class="rep-hint">${s.hint}</span>
        </div>
        <div class="input-group">
          <span class="input-label">Kg / Peso</span>
          <div class="input-wrapper">
            <button class="btn-adj" onclick="adjustVal(this,-1,'${dayId}',${exIdx},${si},'weight')">−</button>
            <input class="num-input" type="number" min="0" step="0.5" value="${wVal}" placeholder="—" oninput="onInputChange(this,'${dayId}',${exIdx},${si},'weight')">
            <button class="btn-adj" onclick="adjustVal(this,1,'${dayId}',${exIdx},${si},'weight')">+</button>
          </div>
        </div>
        <div class="input-group">
          <span class="input-label">Repeticiones</span>
          <div class="input-wrapper">
            <button class="btn-adj" onclick="adjustVal(this,-1,'${dayId}',${exIdx},${si},'reps')">−</button>
            <input class="num-input" type="number" min="0" step="1" value="${rVal}" placeholder="—" oninput="onInputChange(this,'${dayId}',${exIdx},${si},'reps')">
            <button class="btn-adj" onclick="adjustVal(this,1,'${dayId}',${exIdx},${si},'reps')">+</button>
          </div>
        </div>
        <button class="complete-btn ${isDone ? 'done' : ''}" onclick="toggleDone(this,'${dayId}',${exIdx},${si})" title="Marcar serie">✓</button>
      </div>
    `;
  });

  const superTagHTML = ex.superTag
    ? `<div class="super-tag"><div class="super-dot"></div>${ex.superTag}</div>`
    : '';

  return `
    <div class="exercise-card" id="card-${dayId}-${exIdx}">
      <div class="card-header" onclick="toggleCard('${dayId}',${exIdx})">
        <span class="ex-name">${ex.name}</span>
        <div class="ex-badges">${getTypeBadge(ex.type)}</div>
        <span class="toggle-icon">▾</span>
      </div>
      ${superTagHTML}
      <div class="series-container">${seriesHTML}</div>
      ${ex.notes ? `<div class="card-notes">📌 ${ex.notes}</div>` : ''}
    </div>
  `;
}

function buildAll() {
  const tabsEl = document.getElementById('dayTabs');
  const mainEl = document.getElementById('mainContent');

  DAYS.forEach((day, di) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'tab' + (di === 0 ? ' active' : '');
    tab.textContent = day.name;
    tab.onclick = () => switchDay(day.id);
    tabsEl.appendChild(tab);

    // Panel
    let cards = '';
    day.exercises.forEach((ex, ei) => {
      cards += buildCard(ex, ei, day.id);
    });

    const panel = document.createElement('div');
    panel.className = 'day-panel' + (di === 0 ? ' active' : '');
    panel.id = 'panel-' + day.id;
    panel.innerHTML = `
      <div class="day-title">${day.name}</div>
      <div class="day-subtitle">${day.subtitle}</div>
      <div class="day-progress">
        <div class="progress-track"><div class="progress-fill" id="prog-${day.id}"></div></div>
        <span class="progress-text" id="prog-text-${day.id}">0 / ${day.exercises.length} ejercicios</span>
      </div>
      ${cards}
    `;
    mainEl.appendChild(panel);
  });
}

function showNewDayModal() { document.getElementById('newDayModal').classList.add('show'); }
function hideNewDayModal() { document.getElementById('newDayModal').classList.remove('show'); }

function confirmNewDay() {
  // Reset all completed states
  DAYS.forEach(day => {
    day.exercises.forEach((ex, ei) => {
      ex.series.forEach((_, si) => {
        state[day.id].completed[ei][si] = false;
        const btn = document.querySelector(`#card-${day.id}-${ei} .series-row:nth-child(${si+1}) .complete-btn`);
        if (btn) btn.classList.remove('done');
      });
    });
    // Reset all complete buttons visually
    document.querySelectorAll(`#panel-${day.id} .complete-btn`).forEach(b => b.classList.remove('done'));
    updateProgress(day.id);
  });
  saveToStorage();
  hideNewDayModal();
}


function switchDay(dayId) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + dayId).classList.add('active');
  const idx = DAYS.findIndex(d => d.id === dayId);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function toggleCard(dayId, exIdx) {
  const card = document.getElementById(`card-${dayId}-${exIdx}`);
  card.classList.toggle('open');
}

function adjustVal(btn, delta, dayId, exIdx, seriesIdx, field) {
  const input = btn.parentElement.querySelector('.num-input');
  const step = parseFloat(input.step) || 1;
  const cur = parseFloat(input.value) || 0;
  input.value = Math.max(0, cur + delta * step);
  if (dayId !== undefined) {
    state[dayId].values[exIdx][seriesIdx][field] = parseFloat(input.value);
    saveToStorage();
  }
}

function onInputChange(input, dayId, exIdx, seriesIdx, field) {
  state[dayId].values[exIdx][seriesIdx][field] = parseFloat(input.value) || 0;
  saveToStorage();
}

function toggleDone(btn, dayId, exIdx, seriesIdx) {
  state[dayId].completed[exIdx][seriesIdx] = !state[dayId].completed[exIdx][seriesIdx];
  btn.classList.toggle('done', state[dayId].completed[exIdx][seriesIdx]);
  updateProgress(dayId);
  saveToStorage();
}

function updateProgress(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  let done = 0;
  day.exercises.forEach((ex, ei) => {
    const allDone = ex.series.every((_, si) => state[dayId].completed[ei][si]);
    if (allDone) done++;
  });
  const pct = (done / day.exercises.length) * 100;
  document.getElementById(`prog-${dayId}`).style.width = pct + '%';
  document.getElementById(`prog-text-${dayId}`).textContent = `${done} / ${day.exercises.length} ejercicios`;
}

initState();
loadFromStorage();
buildAll();
DAYS.forEach(day => updateProgress(day.id));
</script>
</body>
</html>
